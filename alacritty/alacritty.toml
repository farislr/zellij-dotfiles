[env]
TERM = "xterm-256color"

[window]
decorations = "Buttonless"
startup_mode = "Windowed"
opacity = 0.96
blur = true
dynamic_title = false
padding = { x = 10, y = 8 }
option_as_alt = "OnlyLeft"

[general]
live_config_reload = true

[scrolling]
history = 10000
multiplier = 3

[font]
size = 13.0

[font.normal]
family = "FiraCode Nerd Font Mono"
style = "Regular"

[font.bold]
family = "FiraCode Nerd Font Mono"
style = "Bold"

[font.italic]
family = "FiraCode Nerd Font Mono"
style = "Italic"

# Ligature font presets (activate when installed):
# 1) Keep only ONE preset active at a time.
# 2) Comment out current [font.normal]/[font.bold]/[font.italic] blocks above.
#
# JetBrains Mono preset:
# [font.normal]
# family = "JetBrains Mono"
# style = "Regular"
#
# [font.bold]
# family = "JetBrains Mono"
# style = "Bold"
#
# [font.italic]
# family = "JetBrains Mono"
# style = "Italic"
#
# [font.bold_italic]
# family = "JetBrains Mono"
# style = "Bold Italic"
#
# Fira Code preset:
# [font.normal]
# family = "Fira Code"
# style = "Regular"
#
# [font.bold]
# family = "Fira Code"
# style = "Bold"
#
# [font.italic]
# family = "Fira Code"
# style = "Italic"
#
# [font.bold_italic]
# family = "Fira Code"
# style = "Bold Italic"

[selection]
save_to_clipboard = true

[terminal]
shell = { program = "/bin/zsh", args = ["-l"] }

[cursor]
style = { shape = "Beam", blinking = "On" }
blink_interval = 600

[bell]
duration = 0

[keyboard]
bindings = [
  { key = "Left", mods = "Alt", chars = "\u001bb" },
  { key = "Right", mods = "Alt", chars = "\u001bf" },
  { key = "Back", mods = "Alt", chars = "\u0017" },
]

[mouse]
hide_when_typing = true
